# Tên ứng dụng
spring.application.name=Library Management System

# Database MySQL Configuration
# Thêm tên database library_db và tham số tự tạo database nếu chưa có
spring.datasource.url=jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456789

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

# Dữ liệu mẫu được nạp qua DataInitializer.java (để hỗ trợ UTF-8 tiếng Việt)
spring.sql.init.mode=never

# Server Port
server.port=8080

# UTF-8 Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
# Ẩn các khối code JSON phức tạp (Schemas)
springdoc.swagger-ui.default-models-expand-depth=-1
# Luôn mở sẵn các ô nhập để "Click là hiện ngay"
springdoc.swagger-ui.doc-expansion=full
# Cho phép thử nghiệm ngay lập tức
springdoc.swagger-ui.try-it-out-enabled=true
# Ẩn các thông tin thời gian chạy gây rối mắt
springdoc.swagger-ui.display-request-duration=false